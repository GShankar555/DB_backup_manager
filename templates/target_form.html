{% extends "base.html" %}
{% block title %}{{ 'Edit' if target else 'Add' }} database · Backup Manager{% endblock %}
{% block content %}
<div class="page-head"><div><h1>{{ 'Edit' if target else 'Add' }} database</h1><p>The database tools must exist inside the selected Docker container.</p></div></div>
<form class="panel form-grid" method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label>Display name<input name="name" value="{{ target.name if target else '' }}" placeholder="production-postgres" required></label>
  <label>Database type
    <select name="db_type" required>
      {% for value, label in [('postgres','PostgreSQL'),('mysql','MySQL'),('mssql','Microsoft SQL Server')] %}
      <option value="{{ value }}" {{ 'selected' if target and target.db_type == value }}>{{ label }}</option>
      {% endfor %}
    </select>
  </label>
  <label>Docker container name<input name="container_name" value="{{ target.container_name if target else '' }}" placeholder="postgres-db" required></label>
  <label>Database name<input name="db_name" value="{{ target.db_name if target else '' }}" required></label>
  <label>Database username<input name="db_user" value="{{ target.db_user if target else '' }}" autocomplete="off" required></label>
  <label>Password<input type="password" name="password" autocomplete="new-password" {{ '' if target else 'required' }} placeholder="{{ 'Leave blank to keep current password' if target else '' }}"></label>
  <label>Cron expression<input name="cron_expression" value="{{ target.cron_expression if target else '0 2 * * *' }}" required><small>Five fields: minute hour day month weekday</small></label>
  <label>Retention in days<input type="number" name="retention_days" min="1" value="{{ target.retention_days if target else 30 }}" required></label>
  <label class="checkbox"><input type="checkbox" name="enabled" {{ 'checked' if not target or target.enabled }}> Enable scheduled backups</label>
  <div class="form-actions"><button type="submit">Save database</button><a class="button secondary" href="{{ url_for('dashboard') }}">Cancel</a></div>
</form>
{% endblock %}
